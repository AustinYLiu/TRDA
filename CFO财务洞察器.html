<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CFO智能分析助手</title>
  <style>
    :root {
      --bg: #0E171E;
      --panel: #1a2632;
      --panel-2: #1a2634;
      --panel-3: #111c25;
      --line: #1f2937;
      --line-soft: #1a2632;
      --primary: #FFE700;
      --muted: #5A6A7A;
      --muted-2: #9ca3af;
      --white: #ffffff;
      --green: #4ade80;
      --red: #f05252;
      --shadow: rgba(0, 0, 0, .26);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue",
        "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body { overflow: hidden; }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .svg-sprite {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .icon {
      width: 20px;
      height: 20px;
      display: block;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .icon-sm { width: 16px; height: 16px; }
    .icon-lg { width: 24px; height: 24px; }

    .app {
      display: flex;
      height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      width: 240px;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 1px solid var(--line-soft);
      transition: width .18s ease;
    }

    .sidebar.collapsed {
      width: 76px;
    }

    .sidebar-head {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--line-soft);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--primary);
      color: var(--bg);
      font-size: 14px;
      font-weight: 800;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .12);
    }

    .brand-name {
      color: var(--white);
      font-size: 18px;
      font-weight: 650;
      white-space: nowrap;
      transition: opacity .14s ease;
    }

    .sidebar.collapsed .brand-name,
    .sidebar.collapsed .nav-label {
      opacity: 0;
      pointer-events: none;
      width: 0;
      overflow: hidden;
    }

    .nav {
      flex: 1;
      padding: 16px 12px;
    }

    .nav-link {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      border-radius: 12px;
    }

    .nav-item {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
      transition: background .16s ease, color .16s ease;
    }

    .nav-link:hover .nav-item {
      color: var(--white);
      background: var(--line-soft);
    }

    .nav-link.active .nav-item {
      color: var(--bg);
      background: var(--primary);
    }

    .nav-label {
      font-weight: 500;
      white-space: nowrap;
      transition: opacity .14s ease;
    }

    .sidebar-foot {
      padding: 16px;
      border-top: 1px solid var(--line-soft);
    }

    .collapse-btn {
      width: 100%;
      height: 36px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border-radius: 8px;
      transition: background .16s ease, color .16s ease;
    }

    .collapse-btn:hover {
      color: var(--white);
      background: var(--line-soft);
    }

    .sidebar.collapsed .collapse-btn .icon {
      transform: rotate(180deg);
    }

    main {
      flex: 1;
      min-width: 0;
      height: 100vh;
      overflow: auto;
      background: var(--bg);
    }

    .page {
      min-height: 100vh;
      padding: 24px;
      background: var(--bg);
    }

    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
    }

    .page-title {
      margin: 0 0 8px;
      color: var(--white);
      font-size: 30px;
      line-height: 36px;
      font-weight: 750;
    }

    .page-title.small {
      font-size: 24px;
      line-height: 32px;
      margin-bottom: 0;
    }

    .page-subtitle {
      margin: 0;
      color: var(--muted-2);
      font-size: 16px;
    }

    .section-head { margin-bottom: 32px; }

    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .scenario-card,
    .panel,
    .report-card,
    .viz-card,
    .settings-panel {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .scenario-card {
      min-height: 230px;
      padding: 24px;
      cursor: pointer;
      transition: border-color .16s ease, transform .16s ease, background .16s ease;
    }

    .scenario-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .scenario-card.active {
      border-color: var(--primary);
      transform: none;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .icon-tile {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      color: var(--primary);
      background: rgba(255, 231, 0, .10);
      transition: background .16s ease;
    }

    .scenario-card:hover .icon-tile {
      background: rgba(255, 231, 0, .20);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4b5563;
    }

    .scenario-card:hover .card-actions .message {
      color: var(--primary);
    }

    .scenario-card.active .card-actions {
      color: var(--primary);
    }

    .scenario-chevron {
      transition: transform .16s ease;
    }

    .scenario-card.active .scenario-chevron {
      transform: rotate(90deg);
    }

    .scenario-card h3,
    .panel h3,
    .report-card h3 {
      margin: 0 0 8px;
      color: var(--white);
      font-size: 18px;
      line-height: 28px;
      font-weight: 650;
    }

    .scenario-card p,
    .report-card p {
      margin: 0;
      color: var(--muted-2);
      font-size: 14px;
      line-height: 22px;
    }

    .tags {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      background: var(--bg);
      color: #6b7280;
      font-size: 12px;
      line-height: 1;
    }

    .case-prompts {
      margin-top: 24px;
    }

    .case-prompts p {
      margin: 0 0 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 22px;
    }

    .case-list {
      display: grid;
      gap: 12px;
    }

    .case-row {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--bg);
      color: #d1d5db;
      font-size: 16px;
      line-height: 24px;
      transition: color .16s ease, background .16s ease;
    }

    .case-row:hover {
      color: var(--white);
      background: #111c25;
    }

    .case-row-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .case-row-left span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .case-row .icon {
      color: #d1d5db;
    }

    .case-row > .icon {
      color: var(--muted-2);
    }

    .dashboard-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .panel {
      min-height: 194px;
      padding: 24px;
      background: var(--panel-2);
    }

    .panel.quick {
      border-color: rgba(255, 231, 0, .55);
      background:
        linear-gradient(115deg, rgba(255, 231, 0, .13), rgba(26, 38, 52, .95) 45%),
        var(--panel-2);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .panel-title .icon { color: var(--primary); }

    .recent-list {
      display: grid;
      gap: 12px;
    }

    .recent-row {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg);
      color: var(--white);
      font-size: 14px;
    }

    .recent-row span:last-child {
      color: #6b7280;
      white-space: nowrap;
    }

    .quick-copy {
      margin: -2px 0 14px;
      color: var(--muted-2);
      font-size: 14px;
    }

    .quick-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--white);
      font-size: 14px;
    }

    .quick-list li {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quick-list .icon {
      color: var(--primary);
      width: 15px;
      height: 15px;
    }

    .chat-page {
      height: 100vh;
      display: flex;
      background: var(--bg);
    }

    .chat-shell {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      display: flex;
    }

    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 80%;
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .message.user .bubble {
      color: var(--bg);
      background: var(--primary);
    }

    .message.assistant .bubble {
      color: var(--white);
      background: #1f2937;
    }

    .bubble p {
      margin: 0;
      font-size: 14px;
      line-height: 22px;
    }

    .time {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      opacity: .5;
    }

    .sql-card {
      margin-top: 16px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }

    .sql-head,
    .result-head {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid #374151;
      background: #111827;
    }

    .sql-head-left,
    .result-head-left {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9ca3af;
      font-size: 12px;
    }

    .sql-head-left .icon { color: var(--primary); }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #9ca3af;
      font-size: 12px;
      transition: color .16s ease;
    }

    .copy-btn:hover { color: var(--primary); }

    pre {
      margin: 0;
      padding: 12px;
      color: #4ade80;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 18px;
      white-space: pre;
      overflow-x: auto;
    }

    .result-card {
      margin-top: 16px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--white);
      color: #4b5563;
    }

    .result-head {
      border-bottom: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .result-head-left { color: #4b5563; }

    .query-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      color: #9ca3af;
      font-size: 12px;
    }

    .data-table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #f3f4f6;
      white-space: nowrap;
    }

    th {
      color: #374151;
      font-weight: 600;
      background: #f9fafb;
    }

    td { color: #4b5563; }
    tr:hover td { background: #f9fafb; }

    .composer {
      border-top: 1px solid var(--line-soft);
      padding: 16px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .input-box {
      flex: 1;
      min-width: 0;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-radius: 12px;
      background: var(--panel-2);
      color: var(--white);
    }

    .input-box input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--white);
    }

    .input-box input::placeholder { color: #6b7280; }
    .input-box .icon { color: var(--primary); }

    .send-btn {
      height: 48px;
      min-width: 108px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 20px;
      border-radius: 10px;
      background: var(--primary);
      color: var(--bg);
      font-weight: 650;
    }

    .send-btn:disabled {
      opacity: .72;
      cursor: default;
    }

    .composer-tip {
      margin: 8px 0 0;
      color: #6b7280;
      text-align: center;
      font-size: 12px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .primary-btn {
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border-radius: 8px;
      background: var(--primary);
      color: var(--bg);
      font-weight: 650;
      white-space: nowrap;
      transition: opacity .16s ease, background .16s ease;
    }

    .primary-btn:hover { opacity: .9; }

    .viz-card {
      margin-bottom: 24px;
      background: var(--panel);
      overflow: hidden;
    }

    .viz-toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .segmented {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 8px;
      background: var(--bg);
    }

    .segmented button {
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--muted-2);
      font-size: 14px;
      font-weight: 550;
      transition: background .16s ease, color .16s ease;
      white-space: nowrap;
    }

    .segmented button:hover { color: var(--white); }

    .segmented button.active {
      background: var(--primary);
      color: var(--bg);
      box-shadow: 0 0 0 1px rgba(14, 23, 30, .45) inset;
    }

    .toolbar-spacer { flex: 1; }

    .filter-box {
      width: 208px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted-2);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .03);
    }

    .filter-box input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--white);
      background: transparent;
      font-size: 14px;
    }

    .filter-box input::placeholder { color: #6b7280; }

    .viz-body {
      padding: 24px;
      min-height: 420px;
    }

    .viz-table {
      width: 100%;
      overflow: hidden;
      border-radius: 0;
    }

    .viz-table table {
      font-size: 14px;
      color: var(--white);
    }

    .viz-table thead th {
      padding: 12px 16px;
      color: var(--white);
      background: var(--bg);
      border-bottom: 0;
    }

    .viz-table td {
      padding: 12px 16px;
      color: #e5e7eb;
      border-bottom: 1px solid #f3f4f6;
    }

    .viz-table tbody tr:nth-child(odd) td {
      background: #ffffff;
      color: #f8fafc;
    }

    .viz-table tbody tr:nth-child(even) td {
      background: #f5f5f5;
      color: #f8fafc;
    }

    .viz-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      color: var(--muted-2);
      font-size: 12px;
      background: var(--bg);
    }

    .chart-svg {
      display: block;
      width: 100%;
      height: 390px;
      overflow: visible;
    }

    .axis-label {
      fill: #6b7280;
      font-size: 13px;
    }

    .grid-line {
      stroke: rgba(255, 255, 255, .48);
      stroke-dasharray: 2 4;
      stroke-width: 1;
    }

    .axis-line {
      stroke: rgba(255, 255, 255, .58);
      stroke-width: 1;
    }

    .legend {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-top: -8px;
      color: #6b7280;
      font-size: 14px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend i {
      width: 14px;
      height: 10px;
      display: inline-block;
      border-radius: 1px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .report-card {
      padding: 20px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color .16s ease;
    }

    .report-card:hover { border-color: rgba(255, 231, 0, .55); }

    .report-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .report-icon {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: var(--primary);
      border-radius: 8px;
      background: rgba(255, 231, 0, .10);
    }

    .report-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--muted-2);
    }

    .icon-btn:hover {
      color: var(--white);
      background: #1f2937;
    }

    .report-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #6b7280;
      font-size: 12px;
    }

    .settings-layout {
      display: flex;
      gap: 24px;
    }

    .settings-nav {
      width: 256px;
      flex: 0 0 auto;
    }

    .settings-tabs {
      display: grid;
      gap: 2px;
      padding: 8px;
      border-radius: 12px;
      background: var(--panel);
    }

    .settings-tabs button {
      width: 100%;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-radius: 8px;
      color: var(--muted-2);
      font-weight: 500;
      text-align: left;
      transition: background .16s ease, color .16s ease;
    }

    .settings-tabs button:hover {
      color: var(--white);
      background: #2a3a4a;
    }

    .settings-tabs button.active {
      color: var(--bg);
      background: var(--primary);
    }

    .settings-panel {
      flex: 1;
      min-width: 0;
      padding: 24px;
      background: var(--panel);
      border: 0;
    }

    .settings-panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 28px;
      font-weight: 650;
    }

    .source-list {
      display: grid;
      gap: 12px;
    }

    .source-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px;
      border-radius: 8px;
      background: var(--bg);
    }

    .source-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--green);
    }

    .status-dot.red { background: var(--red); }

    .source-name {
      margin: 0;
      color: var(--white);
      font-weight: 600;
    }

    .source-meta {
      margin: 2px 0 0;
      color: var(--muted-2);
      font-size: 14px;
    }

    .link-btn {
      color: var(--primary);
      font-size: 14px;
      white-space: nowrap;
    }

    .link-btn:hover { text-decoration: underline; }

    .outline-btn {
      height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 0 16px;
      border: 1px solid var(--primary);
      border-radius: 8px;
      color: var(--primary);
      transition: background .16s ease, color .16s ease;
    }

    .outline-btn:hover {
      color: var(--bg);
      background: var(--primary);
    }

    .placeholder-panel {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted-2);
      border: 1px dashed #334155;
      border-radius: 10px;
      background: rgba(14, 23, 30, .5);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 1100px) {
      .scenario-grid,
      .report-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dashboard-bottom,
      .settings-layout {
        grid-template-columns: 1fr;
      }

      .settings-layout { flex-direction: column; }
      .settings-nav { width: 100%; }
    }

    @media (max-width: 760px) {
      body { overflow: auto; }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        z-index: 20;
        width: 76px;
        height: 100vh;
      }

      .brand-name,
      .nav-label { display: none; }

      main {
        height: auto;
        min-height: 100vh;
      }

      .page,
      .messages { padding: 18px; }

      .scenario-grid,
      .report-grid,
      .dashboard-bottom {
        grid-template-columns: 1fr;
      }

      .top-bar,
      .viz-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .segmented {
        width: 100%;
        overflow-x: auto;
      }

      .filter-box { width: 100%; }
      .bubble { max-width: 92%; }
      .send-btn { min-width: 54px; padding: 0 14px; }
      .send-btn span { display: none; }
    }
  </style>
</head>

      { month: "2024-02", a: 132000, b: 105000, c: 82000 },
      { month: "2024-03", a: 128000, b: 112000, c: 89000 },

      return routes.some((route) => route.path === hash) ? hash : "/";

      if (path === "/data") main.innerHTML = renderData();

      if (path === "/settings") main.innerHTML = renderSettings();
      if (path === "/") main.innerHTML = renderDashboard();

    function renderDashboard() {

    function table(headers, rows) {
      return `
        <div class="data-table-wrap">

            </tbody>
          </table>
        </div>
      `;
    }

    function sqlBlock(sql, headers, rows, meta) {
      return `
        <div class="sql-card">
          <div class="sql-head">
            <div class="sql-head-left">${icon("database", "icon-sm")}<span>Generated SQL</span></div>
            <button class="copy-btn" type="button" data-copy>${icon("copy", "icon-sm")}复制</button>
          </div>
          <pre>${sql}</pre>
        </div>
        <div class="result-card">
          <div class="result-head">
            <div class="result-head-left">${icon("table", "icon-sm")}<span>查询结果</span></div>
            <span class="query-meta">${icon("clock", "icon-sm")}${meta}</span>
          </div>
          ${table(headers, rows)}
        </div>
      `;
    }

    function renderChat() {
      const revenueSql = `SELECT
  DATE_FORMAT(date, '%Y-%m') as 月份,
  SUM(CASE WHEN product_id = 1 THEN amount ELSE 0 END) as 产品A,
  SUM(CASE WHEN product_id = 2 THEN amount ELSE 0 END) as 产品B,
  SUM(CASE WHEN product_id = 3 THEN amount ELSE 0 END) as 产品C,
  SUM(amount) as 总计
FROM revenue
WHERE date >= '2024-01-01'
GROUP BY DATE_FORMAT(date, '%Y-%m')
ORDER BY 月份`;

      const costSql = `SELECT d.name as 部门,
  b.amount as 预算,
  SUM(e.amount) as 实际支出,
  b.amount - SUM(e.amount) as 差异,
  ROUND(SUM(e.amount) / b.amount * 100, 1) as 执行率
FROM departments d
JOIN budget b ON d.id = b.dept_id
JOIN expenses e ON d.id = e.dept_id
WHERE e.date >= '2024-01-01'
GROUP BY d.id, d.name, b.amount
ORDER BY 执行率 DESC`;

      return `
        <section class="chat-page">
          <div class="chat-shell">
            <div class="messages" id="messages">
              <div class="message user">
                <div class="bubble">
                  <p>帮我分析一下今年Q2各产品线的收入情况</p>
                  <span class="time">10:30:00</span>
                </div>
              </div>
              <div class="message assistant">
                <div class="bubble">
                  <p>已为您生成Q2各产品线收入分析。从数据可以看出，产品A增长最为显著，6月达到168万，环比增长10.7%。</p>
                  ${sqlBlock(revenueSql, ["月份", "产品A", "产品B", "产品C", "总计"], revenueRows, "0.23s · 6 行")}
                  <span class="time">10:31:00</span>
                </div>
              </div>
              <div class="message user">
                <div class="bubble">
                  <p>分析一下各部门的成本控制情况，看看有没有超预算的</p>
                  <span class="time">10:35:00</span>
                </div>
              </div>
              <div class="message assistant">
                <div class="bubble">
                  <p>已生成成本控制分析报告。发现市场部超预算28万（执行率109%），建议关注营销活动ROI。研发部节省44万，执行效率较高。整体预算执行率为97.2%，控制在合理范围内。</p>
                  ${sqlBlock(costSql, ["部门", "预算(万)", "实际支出(万)", "差异(万)", "执行率"], costRows, "0.18s · 5 行")}
                  <span class="time">10:36:00</span>
                </div>
              </div>
            </div>
            <div class="composer">
              <div class="input-row">
                <label class="input-box">
                  <input id="chatInput" type="text" placeholder="输入您的分析需求，例如：分析本月各区域销售趋势...">
                  ${icon("sparkles", "icon-sm")}
                </label>
                <button class="send-btn" id="sendBtn" type="button" disabled>${icon("send")}<span>发送</span></button>
              </div>
              <p class="composer-tip">AI Agent 会根据您的需求自动生成SQL并执行分析</p>
            </div>
          </div>
        </section>
      `;
    }

    function renderData() {
      const chartButtons = [
        ["table", "表格", "table"],
        ["bar", "柱状图", "bars"],
        ["line", "折线图", "line-chart"],
        ["area", "面积图", "line-chart"],
        ["pie", "饼图", "pie"]
      ];

      return `
        <section class="page">
          <div class="top-bar">
            <h1 class="page-title small">数据可视化</h1>
            <button class="primary-btn" type="button">${icon("download")}导出数据</button>
          </div>
          <div class="viz-card">
            <div class="viz-toolbar">
              <div class="segmented">
                ${chartButtons.map(([type, label, iconName]) => `
                  <button type="button" data-chart="${type}" class="${chartType === type ? "active" : ""}">
                    ${icon(iconName, "icon-sm")}${label}
                  </button>
                `).join("")}
              </div>
              <div class="toolbar-spacer"></div>
              <label class="filter-box">
                ${icon("filter", "icon-sm")}
                <input type="text" placeholder="筛选数据...">
              </label>
            </div>
            <div class="viz-body">${renderVizBody()}</div>
            <div class="viz-foot">
              <span>共 6 条记录</span>
              <span>执行时间: 0.23s</span>
            </div>
          </div>
        </section>
      `;
    }

    function renderVizBody() {
      if (chartType === "table") {
        return `
          <div class="viz-table">
            ${table(["月份", "产品A", "产品B", "产品C", "总计"], revenueRows)}
          </div>
        `;
      }

      if (chartType === "pie") return renderPieChart();
      if (chartType === "area") return renderAreaChart();
      if (chartType === "line") return renderLineChart();
      return renderBarChart();
    }

    function chartScales(max = 180000) {
      const W = 900, H = 330, left = 64, top = 34, right = 24, bottom = 58;
      const innerW = W - left - right;
      const innerH = H - top - bottom;
      const x = (idx) => left + (innerW / (chartData.length - 1)) * idx;
      const y = (value) => top + innerH - (value / max) * innerH;
      return { W, H, left, top, right, bottom, innerW, innerH, x, y, max };
    }

    function grid(max = 180000) {
      const s = chartScales(max);
      const ticks = max === 600000 ? [0, 150000, 300000, 450000, 600000] : [0, 45000, 90000, 135000, 180000];
      return `
        ${ticks.map((tick) => {
          const yy = s.y(tick);
          return `<line class="grid-line" x1="${s.left}" y1="${yy}" x2="${s.W - s.right}" y2="${yy}"></line>
          <text class="axis-label" x="${s.left - 8}" y="${yy + 5}" text-anchor="end">${tick}</text>`;
        }).join("")}
        ${chartData.map((d, i) => {
          const xx = s.x(i);
          return `<line class="grid-line" x1="${xx}" y1="${s.top}" x2="${xx}" y2="${s.top + s.innerH}"></line>
          <text class="axis-label" x="${xx}" y="${s.H - 18}" text-anchor="middle">${d.month}</text>`;
        }).join("")}
        <line class="axis-line" x1="${s.left}" y1="${s.top + s.innerH}" x2="${s.W - s.right}" y2="${s.top + s.innerH}"></line>
        <line class="axis-line" x1="${s.left}" y1="${s.top}" x2="${s.left}" y2="${s.top + s.innerH}"></line>
      `;
    }

    function legend() {
      return `<div class="legend">
        <span><i style="background:#FFE700"></i>产品A</span>
        <span><i style="background:#0b131b"></i>产品B</span>
        <span><i style="background:#647383"></i>产品C</span>
      </div>`;
    }

    function renderBarChart() {
      const s = chartScales();
      const group = s.innerW / chartData.length;
      const bw = 32;
      const bars = chartData.map((d, i) => {
        const cx = s.left + group * i + group / 2;
        return [
          ["a", d.a, "#FFE700", -bw - 5],
          ["b", d.b, "#0b131b", 0],
          ["c", d.c, "#647383", bw + 5]
        ].map(([, value, color, offset]) => {
          const x = cx + offset - bw / 2;
          const y = s.y(value);
          const h = s.top + s.innerH - y;
          return `<rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${color}"></rect>`;
        }).join("");
      }).join("");

      return `<svg class="chart-svg" viewBox="0 0 ${s.W} ${s.H}" role="img" aria-label="柱状图">${grid()}${bars}</svg>${legend()}`;
    }

    function pointList(key, max = 180000) {
      const s = chartScales(max);
      return chartData.map((d, i) => `${s.x(i)},${s.y(d[key])}`).join(" ");
    }

    function renderLineChart() {
      const s = chartScales();
      return `
        <svg class="chart-svg" viewBox="0 0 ${s.W} ${s.H}" role="img" aria-label="折线图">
          ${grid()}
          <polyline points="${pointList("a")}" fill="none" stroke="#FFE700" stroke-width="2"></polyline>
          <polyline points="${pointList("b")}" fill="none" stroke="#0b131b" stroke-width="2"></polyline>
          <polyline points="${pointList("c")}" fill="none" stroke="#647383" stroke-width="2"></polyline>
          ${chartData.map((d, i) => `
            <circle cx="${s.x(i)}" cy="${s.y(d.a)}" r="3" fill="#FFE700"></circle>
            <circle cx="${s.x(i)}" cy="${s.y(d.b)}" r="3" fill="#0b131b"></circle>
            <circle cx="${s.x(i)}" cy="${s.y(d.c)}" r="3" fill="#647383"></circle>
          `).join("")}
        </svg>
        ${legend()}
      `;
    }

    function renderAreaChart() {
      const max = 600000;
      const s = chartScales(max);
      const totals = chartData.map((d) => ({ a: d.a, b: d.a + d.b, c: d.a + d.b + d.c }));
      const base = `${s.x(0)},${s.y(0)} ${chartData.map((d, i) => `${s.x(i)},${s.y(totals[i].a)}`).join(" ")} ${s.x(chartData.length - 1)},${s.y(0)}`;
      const mid = `${s.x(0)},${s.y(totals[0].a)} ${chartData.map((d, i) => `${s.x(i)},${s.y(totals[i].b)}`).join(" ")} ${chartData.slice().reverse().map((d, idx) => {
        const i = chartData.length - 1 - idx;
        return `${s.x(i)},${s.y(totals[i].a)}`;
      }).join(" ")}`;
      const top = `${s.x(0)},${s.y(totals[0].b)} ${chartData.map((d, i) => `${s.x(i)},${s.y(totals[i].c)}`).join(" ")} ${chartData.slice().reverse().map((d, idx) => {
        const i = chartData.length - 1 - idx;
        return `${s.x(i)},${s.y(totals[i].b)}`;
      }).join(" ")}`;

      return `
        <svg class="chart-svg" viewBox="0 0 ${s.W} ${s.H}" role="img" aria-label="面积图">
          ${grid(max)}
          <polygon points="${base}" fill="rgba(255,231,0,.62)"></polygon>
          <polygon points="${mid}" fill="rgba(11,19,27,.72)"></polygon>
          <polygon points="${top}" fill="rgba(100,115,131,.72)"></polygon>
        </svg>
        ${legend()}
      `;
    }

    function pieSlice(cx, cy, r, startAngle, endAngle) {
      const start = polar(cx, cy, r, endAngle);
      const end = polar(cx, cy, r, startAngle);
      const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
    }

    function polar(cx, cy, r, angle) {
      const rad = (angle - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function renderPieChart() {
      const values = [
        { label: "产品A", value: 850000, color: "#FFE700" },
        { label: "产品B", value: 696000, color: "#0b131b" },
        { label: "产品C", value: 559000, color: "#647383" }
      ];
      const total = values.reduce((sum, item) => sum + item.value, 0);
      let angle = 0;
      const paths = values.map((item) => {
        const next = angle + item.value / total * 360;
        const d = pieSlice(450, 165, 115, angle, next);
        const mid = polar(450, 165, 148, angle + (next - angle) / 2);
        angle = next;
        return `<path d="${d}" fill="${item.color}"></path><text x="${mid.x}" y="${mid.y}" fill="${item.color}" font-size="16">${item.value}</text>`;
      }).join("");

      return `
        <svg class="chart-svg" viewBox="0 0 900 330" role="img" aria-label="饼图">
          ${paths}
        </svg>
        ${legend()}
      `;
    }

    function renderReports() {
      const reports = [
        { title: "月度收入趋势", desc: "各产品线月度收入对比分析", type: "chart", date: "2024/6/1", icon: "bars" },
        { title: "成本结构分析", desc: "各部门成本占比及同比变化", type: "mixed", date: "2024/6/5", icon: "file-text" },
        { title: "客户价值分布", desc: "按客户类型和区域的价值分析", type: "table", date: "2024/6/10", icon: "table" }
      ];

      return `
        <section class="page">
          <div class="top-bar">
            <div>
              <h1 class="page-title small">报表中心</h1>
              <p class="page-subtitle">管理和查看您的财务分析报表</p>
            </div>
            <button class="primary-btn" type="button">${icon("plus")}新建报表</button>
          </div>
          <div class="report-grid">
            ${reports.map((report) => `
              <article class="report-card">
                <div class="report-top">
                  <div class="report-icon">${icon(report.icon)}</div>
                  <div class="report-actions">
                    <button class="icon-btn" aria-label="查看">${icon("eye", "icon-sm")}</button>
                    <button class="icon-btn" aria-label="下载">${icon("download", "icon-sm")}</button>
                    <button class="icon-btn" aria-label="删除">${icon("trash", "icon-sm")}</button>
                  </div>
                </div>
                <h3>${report.title}</h3>
                <p>${report.desc}</p>
                <div class="report-meta">
                  <span class="tag">${report.type}</span>
                  <span>${report.date}</span>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderSettings() {
      const tabs = [
        ["sources", "数据源", "database"],
        ["prefs", "偏好设置", "user"],
        ["keys", "API密钥", "key"],
        ["logs", "系统日志", "file-text"]
      ];

      return `
        <section class="page">
          <h1 class="page-title small" style="margin-bottom:24px">设置</h1>
          <div class="settings-layout">
            <div class="settings-nav">
              <div class="settings-tabs">
                ${tabs.map(([id, label, iconName]) => `
                  <button type="button" data-settings="${id}" class="${settingsTab === id ? "active" : ""}">
                    ${icon(iconName)}<span>${label}</span>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="settings-panel">${renderSettingsPanel()}</div>
          </div>
        </section>
      `;
    }

    function renderSettingsPanel() {
      if (settingsTab !== "sources") {
        const labels = { prefs: "偏好设置", keys: "API密钥", logs: "系统日志" };
        return `<h2>${labels[settingsTab]}</h2><div class="placeholder-panel">${labels[settingsTab]}配置面板</div>`;
      }

      const rows = [
        ["生产数据库", "PostgreSQL · 上次同步: 2分钟前", "ok"],
        ["数据仓库", "Snowflake · 上次同步: 5分钟前", "ok"],
        ["BI系统", "MySQL · 上次同步: 2小时前", "red"]
      ];

      return `
        <h2>数据源配置</h2>
        <div class="source-list">
          ${rows.map(([name, meta, status]) => `
            <div class="source-row">
              <div class="source-left">
                <span class="status-dot ${status === "red" ? "red" : ""}"></span>
                <div>
                  <p class="source-name">${name}</p>
                  <p class="source-meta">${meta}</p>
                </div>
              </div>
              <button class="link-btn" type="button">配置</button>
            </div>
          `).join("")}
        </div>
        <button class="outline-btn" type="button">${icon("plus", "icon-sm")}添加数据源</button>
      `;
    }

    function bindPageEvents(path) {
      if (path === "/") {
        document.querySelectorAll("[data-scenario]").forEach((card) => {
          card.addEventListener("click", () => {
            activeScenario = activeScenario === card.dataset.scenario ? "" : card.dataset.scenario;
            render();
          });
        });
        document.querySelectorAll("[data-case-prompt]").forEach((row) => {
          row.addEventListener("click", (event) => {
            event.stopPropagation();
            window.location.hash = "#/chat";
          });
        });
      }

      if (path === "/chat") {
        const input = document.getElementById("chatInput");
        const send = document.getElementById("sendBtn");
        const messages = document.getElementById("messages");
        messages.scrollTop = messages.scrollHeight;
        input.addEventListener("input", () => {
          send.disabled = !input.value.trim();
        });
        send.addEventListener("click", () => {
          if (!input.value.trim()) return;
          const now = new Date();
          const time = now.toTimeString().slice(0, 8);
          messages.insertAdjacentHTML("beforeend", `
            <div class="message user">
              <div class="bubble"><p>${escapeHtml(input.value.trim())}</p><span class="time">${time}</span></div>
            </div>
          `);
          input.value = "";
          send.disabled = true;
          messages.scrollTop = messages.scrollHeight;
        });
        document.querySelectorAll("[data-copy]").forEach((btn) => {
          btn.addEventListener("click", () => {
            btn.innerHTML = `${icon("copy", "icon-sm")}已复制`;
            setTimeout(() => { btn.innerHTML = `${icon("copy", "icon-sm")}复制`; }, 1100);
          });
        });
      }

      if (path === "/data") {
        document.querySelectorAll("[data-chart]").forEach((btn) => {
          btn.addEventListener("click", () => {
            chartType = btn.dataset.chart;
            render();
          });
        });
      }

      if (path === "/settings") {
        document.querySelectorAll("[data-settings]").forEach((btn) => {
          btn.addEventListener("click", () => {
            settingsTab = btn.dataset.settings;
            render();
          });
        });
      }
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    document.getElementById("collapseBtn").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("collapsed");
    });

    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
